<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebar Layout - Bootstrap 5.3</title>
    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <style>
      body {
        min-height: 100vh;
      }

      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100vh;
        background: linear-gradient(180deg, #0d6efd 0%, #0a58ca 100%);
        transition: all 0.3s ease;
        z-index: 1000;
        display: flex;
        flex-direction: column;
      }

      /* Custom Scrollbar untuk Sidebar */
      .sidebar-content::-webkit-scrollbar {
        width: 6px;
      }

      .sidebar-content::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
      }

      .sidebar-content::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
      }

      .sidebar-content::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }

      #sidebar.collapsed {
        left: -250px;
      }

      #content {
        margin-left: 250px;
        transition: all 0.3s ease;
        min-height: 100vh;
      }

      #content.expanded {
        margin-left: 0;
      }

      #sidebarToggle {
        cursor: pointer;
      }

      #sidebar .nav-link {
        color: rgba(255, 255, 255, 0.85);
        padding: 0.75rem 1rem;
        border-radius: 0.375rem;
        margin-bottom: 0.25rem;
        transition: all 0.3s;
      }

      #sidebar .nav-link:hover {
        color: #fff;
        background-color: rgba(255, 255, 255, 0.1);
      }

      #sidebar .nav-link.active {
        color: #fff;
        background-color: rgba(255, 255, 255, 0.2);
      }

      #sidebar .nav-link i {
        margin-right: 0.5rem;
        width: 1.25rem;
      }

      .sidebar-header {
        padding: 1.5rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(180deg, #0d6efd 0%, #0a58ca 100%);
        flex-shrink: 0;
      }

      .sidebar-content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .sidebar-footer {
        flex-shrink: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(180deg, #0a58ca 0%, #084298 100%);
      }

      #content {
        min-height: 100vh;
        transition: all 0.3s;
      }

      .navbar {
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      }

      main > * {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }

      @media (max-width: 768px) {
        #sidebar {
          left: -250px;
        }

        #sidebar.collapsed {
          left: -250px;
        }

        #sidebar:not(.collapsed) {
          left: 0;
        }

        #content {
          margin-left: 0;
        }

        #content.expanded {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container-fluid p-0">
      <!-- Sidebar -->
      <nav id="sidebar">
        <div class="sidebar-header">
          <h5 class="text-white mb-0">
            <i class="bi bi-bootstrap-fill"></i>
            Dashboard
          </h5>
        </div>
        <div class="sidebar-content">
          <ul class="nav flex-column p-3">
            <li class="nav-item">
              <a class="nav-link active" href="#" aria-current="page">
                <i class="bi bi-house-door"></i>
                Beranda
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-speedometer2"></i>
                Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-people"></i>
                Pengguna
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-file-earmark-text"></i>
                Dokumen
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-graph-up"></i>
                Laporan
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-gear"></i>
                Pengaturan
              </a>
            </li>
          </ul>
        </div>

        <div class="sidebar-footer">
          <ul class="nav flex-column px-3 py-3">
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-question-circle"></i>
                Bantuan
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="bi bi-box-arrow-right"></i>
                Keluar
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Main Content -->
      <main id="content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
          <div class="container-fluid">
            <button
              class="btn btn-outline-primary me-3"
              type="button"
              id="sidebarToggle"
            >
              <i class="bi bi-list"></i>
            </button>
            <span class="navbar-brand mb-0 h1">Halaman Utama</span>
            <div class="d-flex align-items-center">
              <div class="dropdown">
                <a
                  class="nav-link dropdown-toggle d-flex align-items-center"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  <img
                    src="https://ui-avatars.com/api/?name=User&background=0d6efd&color=fff"
                    alt="User"
                    class="rounded-circle me-2"
                    width="32"
                    height="32"
                  />
                  <span class="d-none d-sm-inline">User</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <a class="dropdown-item" href="#"
                      ><i class="bi bi-person me-2"></i>Profil</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="#"
                      ><i class="bi bi-gear me-2"></i>Pengaturan</a
                    >
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="#"
                      ><i class="bi bi-box-arrow-right me-2"></i>Keluar</a
                    >
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </nav>

        <!-- Page Content -->
        <div class="py-4">@yield('content')</div>

        <!-- Footer -->
        <footer class="py-4 bg-light mt-auto">
          <div class="container-fluid">
            <div
              class="d-flex align-items-center justify-content-between small"
            >
              <div class="text-muted">Copyright &copy; Dashboard 2026</div>
              <div>
                <a href="#">Privacy Policy</a>
                &middot;
                <a href="#">Terms &amp; Conditions</a>
              </div>
            </div>
          </div>
        </footer>
      </main>
    </div>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Sidebar Toggle Script -->
    <script>
      document
        .getElementById("sidebarToggle")
        .addEventListener("click", function () {
          document.getElementById("sidebar").classList.toggle("collapsed");
          document.getElementById("content").classList.toggle("expanded");
        });
    </script>
  </body>
</html>
